name: Validate Android Build

on:
  push:
    branches: [main, work]
    paths:
      - '.github/workflows/**'
      - 'app/**'
      - 'hidden_api/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'scripts/ci/**'
  pull_request:
    branches: [main, work]
    paths:
      - '.github/workflows/**'
      - 'app/**'
      - 'hidden_api/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'scripts/ci/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Test and build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI_VERSION_CODE: ${{ github.run_number }}
    outputs:
      short_sha: ${{ steps.release_metadata.outputs.short_sha }}
      apk_name: ${{ steps.validate_apk.outputs.apk_name }}
      build_tools: ${{ steps.android_versions.outputs.build_tools }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@4c125117fe7c5aed11272ec4213f602f012f89f2 # v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --location --retry 3 --retry-all-errors \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          echo "$ACTIONLINT_SHA256  $archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" actionlint
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Lint GitHub Actions workflows and CI shell
        run: |
          actionlint
          shellcheck scripts/ci/check_release_signing.sh
          shellcheck scripts/ci/resolve_next_version.sh

      - name: Read and install configured Android platform and build tools
        id: android_versions
        run: |
          compile_sdk=$(sed -n 's/^android\.compileSdk=//p' gradle.properties)
          build_tools=$(sed -n 's/^android\.buildTools=//p' gradle.properties)
          if [[ -z "$compile_sdk" || $(grep -c '^android\.compileSdk=' gradle.properties) -ne 1 ]]; then
            echo "android.compileSdk must be declared exactly once in gradle.properties" >&2
            exit 1
          fi
          if [[ -z "$build_tools" || $(grep -c '^android\.buildTools=' gradle.properties) -ne 1 ]]; then
            echo "android.buildTools must be declared exactly once in gradle.properties" >&2
            exit 1
          fi
          if [[ ! "$compile_sdk" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "android.compileSdk must be a major.minor release in gradle.properties" >&2
            exit 1
          fi
          if [[ ! "$build_tools" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "android.buildTools must be a major.minor.patch release in gradle.properties" >&2
            exit 1
          fi
          {
            echo "ANDROID_COMPILE_SDK=$compile_sdk"
            echo "ANDROID_BUILD_TOOLS=$build_tools"
          } >> "$GITHUB_ENV"
          echo "build_tools=$build_tools" >> "$GITHUB_OUTPUT"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-$compile_sdk" \
            "build-tools;$build_tools"

      - name: Test the Shizuku artifact verifier
        run: python3 -m unittest discover -s scripts/ci -p 'test_*.py'

      - name: Verify configured Shizuku artifacts
        run: python3 scripts/ci/verify_shizuku_artifacts.py

      - name: Run release tests, lint, and build
        run: ./gradlew --no-daemon --stacktrace testDebugUnitTest lintRelease assembleRelease

      - name: Compute release metadata
        id: release_metadata
        run: |
          short_sha=${GITHUB_SHA::7}
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Validate release APK
        id: validate_apk
        run: |
          mapfile -t apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print)
          if (( ${#apks[@]} != 1 )); then
            printf 'Expected exactly one release APK, found %d\n' "${#apks[@]}" >&2
            printf '%s\n' "${apks[@]}" >&2
            exit 1
          fi

          mkdir -p dist
          apk_name="language-selector-${{ steps.release_metadata.outputs.short_sha }}.apk"
          cp "${apks[0]}" "dist/$apk_name"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Upload release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-apk-${{ github.sha }}
          path: dist/${{ steps.validate_apk.outputs.apk_name }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Upload diagnostic reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-diagnostics-${{ github.run_id }}
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14
